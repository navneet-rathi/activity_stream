---
- name: Generate Last 1 Month Job Report
  hosts: aux_server
  become: true
  gather_facts: no
  vars:
    controller_url: "https://192.168.64.63"
    controller_token: "your_api_token"
    # Calculate date 30 days ago in ISO format (YYYY-MM-DD)
    last_month: "{{ lookup('pipe', 'date -d \"30 days ago\" +%Y-%m-%d') }}"

  tasks:
    - name: Fetch jobs from the last 30 days
      uri:
        url: "{{ controller_url }}/api/controller/v2/jobs/?finished__gte={{ last_month }}&order_by=-finished"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ controller_token }}"
        status_code: 200
      register: job_api_response

    - name: Generate HTML Report
      template:
        src: report_template.j2
        dest: "./job_report_{{ ansible_date_time.date }}.html"
      vars:
        jobs: "{{ job_api_response.json.results }}"
        report_title: "Monthly Automation Summary"
        report_range: "Last 30 Days (Since {{ last_month }})"

    - name: copy report to aux_server
      ansible.builtin.copy:
        src: "./job_report_{{ ansible_date_time.date }}.html"
        dest: "/usr/share/nginx/html"
  #    delegate_to: aux_server  
